name: Mac Dev Build

on:
  workflow_dispatch:

jobs:
  build-macos-arch:
    name: Build macOS App (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch_label: apple-silicon
            rust_target: aarch64-apple-darwin
            tauri_config: tauri.macos.conf.json
            sidecar_dir: backend_script-aarch64-apple-darwin
            app_artifact_name: amverge-macos-arm64-app
          - runner: macos-14
            arch_label: intel
            rust_target: x86_64-apple-darwin
            tauri_config: tauri.macos.intel.conf.json
            sidecar_dir: backend_script-x86_64-apple-darwin
            app_artifact_name: amverge-macos-x64-app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=optional

      - name: Work around npm optional dependency issue (Rollup)
        working-directory: frontend
        run: |
          ROLLUP_VERSION=$(node -e "console.log(require('rollup/package.json').version)")
          ROLLUP_ARCH=$(node -p "process.arch")
          if [ "$ROLLUP_ARCH" = "arm64" ]; then
            ROLLUP_PKG="@rollup/rollup-darwin-arm64"
          else
            ROLLUP_PKG="@rollup/rollup-darwin-x64"
          fi
          npm i --no-save "${ROLLUP_PKG}@${ROLLUP_VERSION}"

      - name: Install Tauri CLI (Rust)
        run: cargo install tauri-cli --version '^2.0'

      - name: Create backend venv and install dependencies
        run: |
          python -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt
          backend/venv/bin/pip install pyinstaller

      - name: Install FFmpeg binaries
        run: |
          brew install ffmpeg
          mkdir -p backend/bin
          cp "$(which ffmpeg)" backend/bin/ffmpeg
          cp "$(which ffprobe)" backend/bin/ffprobe
          chmod +x backend/bin/ffmpeg backend/bin/ffprobe

      - name: Build Python sidecar
        working-directory: frontend
        run: node scripts/build-sidecar.mjs --target ${{ matrix.rust_target }}

      - name: Verify macOS sidecar exists
        run: ls -la frontend/src-tauri/bin/${{ matrix.sidecar_dir }}

      - name: Build macOS app bundle
        working-directory: frontend/src-tauri
        run: cargo tauri build --target ${{ matrix.rust_target }} --bundles app --config ${{ matrix.tauri_config }}

      - name: Debug bundled outputs
        run: |
          echo "Bundle directory tree for target ${{ matrix.rust_target }}:"
          find frontend/src-tauri/target/${{ matrix.rust_target }}/release/bundle -maxdepth 3 -print || true

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          BUNDLE_ROOT="frontend/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          APP_BUNDLE="$(find "$BUNDLE_ROOT" -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_BUNDLE" ]; then
            echo "No .app bundle found in $BUNDLE_ROOT"
            find "$BUNDLE_ROOT" -maxdepth 4 -print || true
            exit 1
          fi
          APP_BUNDLE_DIR="$(dirname "$APP_BUNDLE")"
          tar -C "$APP_BUNDLE_DIR" -czf artifacts/${{ matrix.app_artifact_name }}.tar.gz "$(basename "$APP_BUNDLE")"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_artifact_name }}
          path: artifacts/${{ matrix.app_artifact_name }}.tar.gz
          if-no-files-found: error

  package-universal-macos:
    name: Package Universal macOS DMG
    needs: build-macos-arch
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
      APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
      APPLE_ASC_API_KEY: ${{ secrets.APPLE_ASC_API_KEY }}
      APPLE_ASC_API_KEY_BASE64: ${{ secrets.APPLE_ASC_API_KEY_BASE64 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import Apple signing certificate
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE is empty"
            exit 1
          fi
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12 2>/dev/null || printf '%s' "$APPLE_CERTIFICATE" | base64 -D > certificate.p12
          echo "Decoded certificate.p12 bytes: $(wc -c < certificate.p12)"
          echo "Decoded certificate.p12 sha256:"
          shasum -a 256 certificate.p12

          echo "Verifying PKCS#12 payload with provided password..."
          openssl pkcs12 -in certificate.p12 -noout -passin "pass:$APPLE_CERTIFICATE_PASSWORD"

          echo "Extracting cert metadata from PKCS#12..."
          openssl pkcs12 -in certificate.p12 -clcerts -nokeys -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out extracted-cert.pem
          openssl x509 -in extracted-cert.pem -noout -subject -issuer -serial -dates
          openssl x509 -in extracted-cert.pem -noout -fingerprint -sha256

          echo "Extracting private key from PKCS#12 for direct keychain import..."
          openssl pkcs12 -in certificate.p12 -nocerts -nodes -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out extracted-key.pem

          KEYCHAIN_PATH="$RUNNER_TEMP/universal-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import extracted-cert.pem -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security import extracted-key.pem -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Available code-signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if [ -n "$APPLE_SIGNING_IDENTITY" ] && security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Fq "$APPLE_SIGNING_IDENTITY"; then
            EFFECTIVE_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY"
            echo "Using configured identity from secret."
          else
            EFFECTIVE_SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
            if [ -z "$EFFECTIVE_SIGNING_IDENTITY" ]; then
              echo "No Developer ID Application identity found in keychain"
              exit 1
            fi
            echo "Configured APPLE_SIGNING_IDENTITY was not found; using detected identity."
          fi

          echo "EFFECTIVE_SIGNING_IDENTITY=$EFFECTIVE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Download arm64 app artifact
        uses: actions/download-artifact@v4
        with:
          name: amverge-macos-arm64-app
          path: artifacts/arm64

      - name: Download x64 app artifact
        uses: actions/download-artifact@v4
        with:
          name: amverge-macos-x64-app
          path: artifacts/x64

      - name: Extract app bundles
        run: |
          mkdir -p build-input/arm64 build-input/x64 build-output
          tar -xzf artifacts/arm64/amverge-macos-arm64-app.tar.gz -C build-input/arm64
          tar -xzf artifacts/x64/amverge-macos-x64-app.tar.gz -C build-input/x64
          ARM_APP_PATH="$(find build-input/arm64 -maxdepth 1 -type d -name '*.app' | head -n 1)"
          X64_APP_PATH="$(find build-input/x64 -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$ARM_APP_PATH" ] || [ -z "$X64_APP_PATH" ]; then
            echo "Missing extracted .app bundle(s)"
            echo "arm64 contents:"
            ls -la build-input/arm64
            echo "x64 contents:"
            ls -la build-input/x64
            exit 1
          fi
          APP_BUNDLE_NAME="$(basename "$ARM_APP_PATH")"
          UNIVERSAL_APP_PATH="build-output/$APP_BUNDLE_NAME"
          echo "ARM_APP_PATH=$ARM_APP_PATH" >> "$GITHUB_ENV"
          echo "X64_APP_PATH=$X64_APP_PATH" >> "$GITHUB_ENV"
          echo "UNIVERSAL_APP_PATH=$UNIVERSAL_APP_PATH" >> "$GITHUB_ENV"
          echo "APP_VOLNAME=${APP_BUNDLE_NAME%.app}" >> "$GITHUB_ENV"

      - name: Merge universal app bundle
        run: |
          node frontend/scripts/merge-universal-macos-app.mjs \
            --armApp "$ARM_APP_PATH" \
            --x64App "$X64_APP_PATH" \
            --outApp "$UNIVERSAL_APP_PATH" \
            --signIdentity "$EFFECTIVE_SIGNING_IDENTITY" \
            --config frontend/src-tauri/tauri.macos.universal.conf.json

      - name: Re-sign embedded Python sidecar binaries
        run: |
          SIDECAR_ROOT="$UNIVERSAL_APP_PATH/Contents/Resources/bin"
          if [ ! -d "$SIDECAR_ROOT" ]; then
            echo "Sidecar bin directory not found at $SIDECAR_ROOT"
            exit 1
          fi

          echo "Signing nested framework bundles first..."
          find "$SIDECAR_ROOT" -type d -name '*.framework' -print0 | while IFS= read -r -d '' framework; do
            codesign --force --sign "$EFFECTIVE_SIGNING_IDENTITY" --timestamp --options runtime "$framework"
          done

          echo "Signing Mach-O files under sidecar bin directories..."
          find "$SIDECAR_ROOT" -type f -print0 | while IFS= read -r -d '' f; do
            if [[ "$f" == *".framework/"* ]]; then
              continue
            fi

            if file -b "$f" | grep -q 'Mach-O'; then
              codesign --force --sign "$EFFECTIVE_SIGNING_IDENTITY" --timestamp --options runtime "$f"
            fi
          done

      - name: Re-sign universal app bundle (final)
        run: |
          codesign --force --sign "$EFFECTIVE_SIGNING_IDENTITY" --timestamp --options runtime "$UNIVERSAL_APP_PATH"
          codesign --verify --strict --deep --verbose=2 "$UNIVERSAL_APP_PATH"

      - name: Create universal DMG
        run: |
          mkdir -p frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg
          DMG_PATH="frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/AMVerge-macos-universal.dmg"

          # Clear stale mounts from previous attempts on the same runner image.
          hdiutil info | awk '/\/Volumes\/'"$APP_VOLNAME"'$/ {print $1}' | while read -r dev; do
            [ -n "$dev" ] && hdiutil detach "$dev" -force || true
          done

          # Ensure old artifact does not hold an open handle.
          rm -f "$DMG_PATH"

          # Retry to tolerate transient hdiutil "Resource busy" flakiness.
          for attempt in 1 2 3; do
            if hdiutil create \
              -volname "$APP_VOLNAME" \
              -srcfolder "$UNIVERSAL_APP_PATH" \
              -ov \
              -format UDZO \
              "$DMG_PATH"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "hdiutil create failed after 3 attempts"
              exit 1
            fi

            echo "hdiutil create failed (attempt $attempt), retrying..."
            hdiutil info | awk '/\/Volumes\/'"$APP_VOLNAME"'$/ {print $1}' | while read -r dev; do
              [ -n "$dev" ] && hdiutil detach "$dev" -force || true
            done
          done

      - name: Sign universal DMG
        run: |
          DMG_PATH="frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/AMVerge-macos-universal.dmg"
          codesign --force --sign "$EFFECTIVE_SIGNING_IDENTITY" --timestamp "$DMG_PATH"

      - name: Notarize and staple universal DMG
        run: |
          DMG_PATH="frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/AMVerge-macos-universal.dmg"
          NOTARY_SUBMIT_JSON="$RUNNER_TEMP/notary-submit.json"
          NOTARY_PASSWORD="$(printf '%s' "${APPLE_APP_SPECIFIC_PASSWORD:-$APPLE_PASSWORD}" | tr -d '[:space:]')"
          APPLE_ID_CLEAN="$(printf '%s' "$APPLE_ID" | tr -d '[:space:]')"
          SIGNING_TEAM_ID="$(printf '%s' "$EFFECTIVE_SIGNING_IDENTITY" | sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')"
          NOTARY_TEAM_ID="$(printf '%s' "${APPLE_NOTARY_TEAM_ID:-${APPLE_TEAM_ID:-$SIGNING_TEAM_ID}}" | tr -d '[:space:]')"

          if [ -n "$APPLE_ASC_KEY_ID" ] && [ -n "$APPLE_ASC_ISSUER_ID" ] && { [ -n "$APPLE_ASC_API_KEY" ] || [ -n "$APPLE_ASC_API_KEY_BASE64" ]; }; then
            echo "Using App Store Connect API key auth for notarization."
            KEY_DIR="$RUNNER_TEMP/private_keys"
            KEY_PATH="$KEY_DIR/AuthKey_${APPLE_ASC_KEY_ID}.p8"
            mkdir -p "$KEY_DIR"

            if [ -n "$APPLE_ASC_API_KEY_BASE64" ]; then
              printf '%s' "$APPLE_ASC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH" 2>/dev/null || printf '%s' "$APPLE_ASC_API_KEY_BASE64" | base64 -D > "$KEY_PATH"
            else
              printf '%s' "$APPLE_ASC_API_KEY" > "$KEY_PATH"
            fi

            chmod 600 "$KEY_PATH"

            xcrun notarytool submit "$DMG_PATH" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_ASC_KEY_ID" \
              --issuer "$APPLE_ASC_ISSUER_ID" \
              --output-format json \
              --wait > "$NOTARY_SUBMIT_JSON"
          else
            if [ -z "$NOTARY_PASSWORD" ]; then
              echo "Missing notarization password. Set APPLE_APP_SPECIFIC_PASSWORD (preferred) or APPLE_PASSWORD to an Apple app-specific password from appleid.apple.com."
              echo "Or configure API key auth via APPLE_ASC_KEY_ID, APPLE_ASC_ISSUER_ID, and APPLE_ASC_API_KEY(_BASE64)."
              exit 1
            fi

            if [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_PASSWORD" ]; then
              echo "APPLE_APP_SPECIFIC_PASSWORD is not set; falling back to APPLE_PASSWORD for notarization."
            fi

            if [ -z "$APPLE_ID_CLEAN" ]; then
              echo "Missing APPLE_ID secret."
              exit 1
            fi

            if [ -z "$NOTARY_TEAM_ID" ]; then
              echo "Missing Team ID for notarization. Set APPLE_NOTARY_TEAM_ID or APPLE_TEAM_ID."
              exit 1
            fi

            echo "Using Apple ID auth for notarization with Team ID: ${NOTARY_TEAM_ID}"

            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID_CLEAN" \
              --password "$NOTARY_PASSWORD" \
              --team-id "$NOTARY_TEAM_ID" \
              --output-format json \
              --wait > "$NOTARY_SUBMIT_JSON"
          fi

          if [ ! -s "$NOTARY_SUBMIT_JSON" ]; then
            echo "Notary submission did not produce JSON output."
            exit 1
          fi

          cat "$NOTARY_SUBMIT_JSON"

          NOTARY_ID="$(sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$NOTARY_SUBMIT_JSON" | head -n 1)"
          NOTARY_STATUS="$(sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$NOTARY_SUBMIT_JSON" | head -n 1)"

          if [ -z "$NOTARY_ID" ] || [ -z "$NOTARY_STATUS" ]; then
            echo "Unable to parse notary id/status from JSON output."
            exit 1
          fi

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization status is '$NOTARY_STATUS' (expected Accepted)."
            echo "Fetching detailed notary log for submission id: $NOTARY_ID"

            if [ -n "$APPLE_ASC_KEY_ID" ] && [ -n "$APPLE_ASC_ISSUER_ID" ] && { [ -n "$APPLE_ASC_API_KEY" ] || [ -n "$APPLE_ASC_API_KEY_BASE64" ]; }; then
              xcrun notarytool log "$NOTARY_ID" \
                --key "$KEY_PATH" \
                --key-id "$APPLE_ASC_KEY_ID" \
                --issuer "$APPLE_ASC_ISSUER_ID" || true
            else
              xcrun notarytool log "$NOTARY_ID" \
                --apple-id "$APPLE_ID_CLEAN" \
                --password "$NOTARY_PASSWORD" \
                --team-id "$NOTARY_TEAM_ID" || true
            fi

            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload universal DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: amverge-macos-universal-dmg
          path: frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/AMVerge-macos-universal.dmg
          if-no-files-found: error